<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Screensaver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0d0d0d; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Walk a fraction (0=12oclock, 0.25=3, 0.5=6, 0.75=9) along a rectangle
  // starting at top-center, going clockwise.
  // x1,y1 = top-left corner, x2,y2 = bottom-right corner
  // Returns {x, y, nx, ny} where nx,ny is the inward normal
  function rectPoint(frac, x1, y1, x2, y2) {
    const w = x2 - x1, h = y2 - y1;
    const perim = 2 * (w + h);
    // distance from top-left corner to top-center = w/2
    // so offset our walk by w/2 to start at top-center
    let d = ((frac * perim) + w / 2) % perim;

    let px, py, nx, ny;
    if (d < w) {
      // top edge, left→right
      px = x1 + d; py = y1; nx = 0; ny = 1;
    } else if (d < w + h) {
      // right edge, top→bottom
      px = x2; py = y1 + (d - w); nx = -1; ny = 0;
    } else if (d < 2 * w + h) {
      // bottom edge, right→left
      px = x2 - (d - w - h); py = y2; nx = 0; ny = -1;
    } else {
      // left edge, bottom→top
      px = x1; py = y2 - (d - 2 * w - h); nx = 1; ny = 0;
    }
    return { x: px, y: py, nx, ny };
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const S = Math.min(W, H);

    // ── Background ───────────────────────────────────────────
    const bg = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy, Math.max(W, H) * 0.75);
    bg.addColorStop(0, '#1c1c1c');
    bg.addColorStop(1, '#080808');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const vig = ctx.createRadialGradient(cx, cy, S * 0.1, cx, cy, Math.max(W, H) * 0.75);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // ── Shared perimeter: ticks live here ────────────────────
    const edgeM = S * 0.018;
    const ex1 = edgeM, ey1 = edgeM, ex2 = W - edgeM, ey2 = H - edgeM;
    const tickMaj = S * 0.034, tickMin = S * 0.016;

    ctx.lineCap = 'round';
    for (let i = 0; i < 60; i++) {
      const frac = i / 60;
      const { x: px, y: py, nx, ny } = rectPoint(frac, ex1, ey1, ex2, ey2);
      const isMajor = i % 5 === 0;
      const len = isMajor ? tickMaj : tickMin;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + nx * len, py + ny * len);
      ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.65)' : 'rgba(255,255,255,0.22)';
      ctx.lineWidth   = isMajor ? S * 0.005 : S * 0.0024;
      ctx.stroke();
    }

    // ── Numbers: same rectPoint system, inset rectangle ──────
    const numInset = S * 0.09;
    const nx1 = numInset, ny1 = numInset, nx2 = W - numInset, ny2 = H - numInset;

    const fontSize = S * 0.082;
    ctx.font         = `500 ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Hours 12,1,2,...,11 map to fractions 0, 1/12, 2/12, ..., 11/12
    for (let h = 0; h < 12; h++) {
      const frac = h / 12; // 0 = 12 o'clock
      const { x, y } = rectPoint(frac, nx1, ny1, nx2, ny2);
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur  = fontSize * 0.6;
      ctx.fillStyle   = '#ffffff';
      ctx.fillText(h === 0 ? 12 : h, x, y);
      ctx.shadowBlur  = 0;
    }

    // ── QUARTZ label ─────────────────────────────────────────
    ctx.font      = `400 ${S * 0.018}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillText('QUARTZ', cx, cy + (ny2 - cy) * 0.42);

    // ── Hands ────────────────────────────────────────────────
    const now    = new Date();
    const sec    = now.getSeconds() + now.getMilliseconds() / 1000;
    const minVal = now.getMinutes() + sec / 60;
    const hrVal  = (now.getHours() % 12) + minVal / 60;

    const minAngle = minVal / 60 * Math.PI * 2 - Math.PI / 2;
    const hrAngle  = hrVal  / 12 * Math.PI * 2 - Math.PI / 2;

    // Hand reach via ray-cast to inset rectangle (just inside the numbers)
    const handInset = numInset + fontSize * 0.75;
    function handReach(angle) {
      const dx = Math.cos(angle), dy = Math.sin(angle);
      const hw = (W - handInset * 2) / 2;
      const hh = (H - handInset * 2) / 2;
      let t = Infinity;
      if (Math.abs(dx) > 0.0001) t = Math.min(t, hw / Math.abs(dx));
      if (Math.abs(dy) > 0.0001) t = Math.min(t, hh / Math.abs(dy));
      return t;
    }

    const minLen = handReach(minAngle);
    const hrLen  = handReach(hrAngle) * 0.58;

    function hand(angle, len, tail, width, color, glow) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = glow;
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(angle) * tail, cy - Math.sin(angle) * tail);
      ctx.lineTo(cx + Math.cos(angle) * len,  cy + Math.sin(angle) * len);
      ctx.strokeStyle = color;
      ctx.lineWidth   = width;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
    }

    hand(hrAngle,  hrLen,  S * 0.04, S * 0.013, '#f0f0f0', S * 0.055);
    hand(minAngle, minLen, S * 0.05, S * 0.008, '#f0f0f0', S * 0.038);

    // ── Center jewel ─────────────────────────────────────────
    ctx.save();
    ctx.shadowColor = '#c8a84b';
    ctx.shadowBlur  = S * 0.03;
    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.016, 0, Math.PI * 2);
    ctx.fillStyle = '#c8a84b';
    ctx.fill();
    ctx.restore();
    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.007, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
