<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Screensaver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0d0d0d; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Place a point at fraction `frac` (0–1) along the perimeter of a rectangle
  // starting from top-center going clockwise, matching clock: 12 at top, 3 right, etc.
  function perimPoint(frac, x1, y1, x2, y2) {
    const w = x2 - x1, h = y2 - y1;
    const perim = 2 * (w + h);
    // Start at top-center, go clockwise
    const start = w / 2; // distance along top from left corner to center-top
    let d = (frac * perim + start) % perim;

    let px, py;
    if (d < w) {
      px = x1 + d;       py = y1;           // top edge →
    } else if (d < w + h) {
      px = x2;           py = y1 + (d - w); // right edge ↓
    } else if (d < 2*w + h) {
      px = x2 - (d - w - h); py = y2;       // bottom edge ←
    } else {
      px = x1;           py = y2 - (d - 2*w - h); // left edge ↑
    }
    return { x: px, y: py };
  }

  function draw() {
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const S = Math.min(W, H);

    // ── Background ───────────────────────────────────────────
    const bg = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy, Math.max(W, H) * 0.75);
    bg.addColorStop(0, '#1c1c1c');
    bg.addColorStop(1, '#080808');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const vig = ctx.createRadialGradient(cx, cy, S * 0.1, cx, cy, Math.max(W, H) * 0.75);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // ── Perimeter tick marks ──────────────────────────────────
    const edgeM = S * 0.018;
    const tx1 = edgeM, ty1 = edgeM, tx2 = W - edgeM, ty2 = H - edgeM;
    const pW = tx2 - tx1, pH = ty2 - ty1;
    const perim = 2 * (pW + pH);
    const tickMaj = S * 0.034, tickMin = S * 0.016;

    ctx.lineCap = 'round';
    for (let i = 0; i < 60; i++) {
      const frac = i / 60;
      const d = frac * perim;
      let px, py, nx, ny;
      if (d < pW) {
        px = tx1 + d; py = ty1; nx = 0; ny = 1;
      } else if (d < pW + pH) {
        px = tx2; py = ty1 + (d - pW); nx = -1; ny = 0;
      } else if (d < 2*pW + pH) {
        px = tx2 - (d - pW - pH); py = ty2; nx = 0; ny = -1;
      } else {
        px = tx1; py = ty2 - (d - 2*pW - pH); nx = 1; ny = 0;
      }
      const isMajor = i % 5 === 0;
      const len = isMajor ? tickMaj : tickMin;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + nx * len, py + ny * len);
      ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.65)' : 'rgba(255,255,255,0.22)';
      ctx.lineWidth   = isMajor ? S * 0.005 : S * 0.0024;
      ctx.stroke();
    }

    // ── Number ring: inset rectangle ─────────────────────────
    const numInset = S * 0.09;   // inset from screen edge
    const nx1 = numInset, ny1 = numInset;
    const nx2 = W - numInset, ny2 = H - numInset;

    const fontSize = S * 0.082;
    ctx.font         = `500 ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Store number positions for hand length calculation
    const numPositions = [];
    for (let h = 0; h < 12; h++) {
      const frac = h / 12;
      const pos = perimPoint(frac, nx1, ny1, nx2, ny2);
      numPositions.push(pos);

      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur  = fontSize * 0.6;
      ctx.fillStyle   = '#ffffff';
      ctx.fillText(h === 0 ? 12 : h, pos.x, pos.y);
      ctx.shadowBlur  = 0;
    }

    // ── QUARTZ label ─────────────────────────────────────────
    ctx.font      = `400 ${S * 0.018}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillText('QUARTZ', cx, cy + (ny2 - cy) * 0.42);

    // ── Hands ────────────────────────────────────────────────
    const now    = new Date();
    const sec    = now.getSeconds() + now.getMilliseconds() / 1000;
    const minVal = now.getMinutes() + sec / 60;
    const hrVal  = (now.getHours() % 12) + minVal / 60;

    const minAngle = minVal / 60 * Math.PI * 2 - Math.PI / 2;
    const hrAngle  = hrVal  / 12 * Math.PI * 2 - Math.PI / 2;

    // Hand reach: same perimeter-intersection approach as numbers,
    // but inset a bit more (gap so tip doesn't overlap the digit)
    const handInset = numInset + fontSize * 0.75;
    const hx1 = handInset, hy1 = handInset;
    const hx2 = W - handInset, hy2 = H - handInset;

    function handReach(angle) {
      // Ray from center at `angle` intersecting the hand rectangle
      const dx = Math.cos(angle), dy = Math.sin(angle);
      const hw = (hx2 - hx1) / 2, hh = (hy2 - hy1) / 2;
      let t = Infinity;
      if (Math.abs(dx) > 0.0001) t = Math.min(t, hw / Math.abs(dx));
      if (Math.abs(dy) > 0.0001) t = Math.min(t, hh / Math.abs(dy));
      return t;
    }

    const minLen = handReach(minAngle);
    const hrLen  = handReach(hrAngle) * 0.58;

    function hand(angle, len, tail, width, color, glow) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = glow;
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(angle) * tail, cy - Math.sin(angle) * tail);
      ctx.lineTo(cx + Math.cos(angle) * len,  cy + Math.sin(angle) * len);
      ctx.strokeStyle = color;
      ctx.lineWidth   = width;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
    }

    hand(hrAngle,  hrLen,  S * 0.04, S * 0.013, '#f0f0f0', S * 0.055);
    hand(minAngle, minLen, S * 0.05, S * 0.008, '#f0f0f0', S * 0.038);

    // ── Center jewel ─────────────────────────────────────────
    ctx.save();
    ctx.shadowColor = '#c8a84b';
    ctx.shadowBlur  = S * 0.03;
    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.016, 0, Math.PI * 2);
    ctx.fillStyle = '#c8a84b';
    ctx.fill();
    ctx.restore();
    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.007, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
