<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  // ── Low-power strategy ───────────────────────────────────
  // • Pure black background  → OLED pixels off = zero power
  // • Only redraws once per second (not 60fps)
  // • No gradients, no shadows, no glow effects
  // • Minimal pixel count: thin lines, sparse marks
  // • document.hidden check pauses when tab is backgrounded

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    drawClock(); // redraw immediately on resize
  }
  resize();
  window.addEventListener('resize', resize);

  function drawClock() {
    if (document.hidden) return; // don't paint when tab is not visible

    const W  = canvas.width, H = canvas.height;
    const cx = W / 2,        cy = H / 2;
    const R  = Math.min(W, H) * 0.385;
    const S  = Math.min(W, H);

    // Pure black — OLED pixels off
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // ── Tick marks (inside the circle) ──────────────────────
    ctx.lineCap = 'round';
    for (let i = 0; i < 60; i++) {
      const a      = (i / 60) * Math.PI * 2 - Math.PI / 2;
      const isMaj  = i % 5 === 0;
      const inner  = R;
      const outer  = isMaj ? R - S * 0.032 : R - S * 0.015;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
      ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
      ctx.strokeStyle = isMaj ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.18)';
      ctx.lineWidth   = isMaj ? S * 0.004 : S * 0.002;
      ctx.stroke();
    }

    // ── Hour numbers (outside the circle) ───────────────────
    const numR    = R * 1.18;
    const fontSizeMaj = S * 0.115;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    for (let h = 1; h <= 12; h++) {
      const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
      ctx.font      = `400 ${fontSizeMaj}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillText(h, cx + Math.cos(a) * numR * 0.97, cy + Math.sin(a) * numR * 0.97);
    }

    // ── QUARTZ label ────────────────────────────────────────
    ctx.font      = `300 ${S * 0.016}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.fillText('QUARTZ', cx, cy + R * 0.42);

    // ── Hands ───────────────────────────────────────────────
    const now    = new Date();
    const minVal = now.getMinutes() + now.getSeconds() / 60;
    const hrVal  = (now.getHours() % 12) + minVal / 60;

    const minAngle = minVal / 60 * Math.PI * 2 - Math.PI / 2;
    const hrAngle  = hrVal  / 12 * Math.PI * 2 - Math.PI / 2;

    function hand(angle, len, tail, width, color) {
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(angle) * tail, cy - Math.sin(angle) * tail);
      ctx.lineTo(cx + Math.cos(angle) * len,  cy + Math.sin(angle) * len);
      ctx.strokeStyle = color;
      ctx.lineWidth   = width;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }

    hand(hrAngle,  R * 0.54, R * 0.12, S * 0.010, 'rgba(255,255,255,0.92)');
    hand(minAngle, R * 0.84, R * 0.14, S * 0.006, 'rgba(255,255,255,0.92)');

    // ── Center dot ──────────────────────────────────────────
    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.010, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,168,75,0.9)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.004, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
  }

  // Redraw once per second aligned to the clock tick
  function scheduleTick() {
    drawClock();
    const now   = new Date();
    const delay = 1000 - now.getMilliseconds(); // wait until next whole second
    setTimeout(scheduleTick, delay);
  }

  // Redraw when tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) drawClock();
  });

  scheduleTick();
</script>
</body>
</html>
