<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Screensaver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0d0d0d; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;
    const S = Math.min(W, H); // scale reference

    // ── Background ──────────────────────────────────────────
    const bg = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy, Math.max(W, H) * 0.75);
    bg.addColorStop(0, '#1c1c1c');
    bg.addColorStop(1, '#080808');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Vignette
    const vig = ctx.createRadialGradient(cx, cy, S * 0.25, cx, cy, Math.max(W, H) * 0.8);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // ── Perimeter tick marks ─────────────────────────────────
    const margin = S * 0.042;
    const tickMajorLen = S * 0.036;
    const tickMinorLen = S * 0.017;

    // Rectangle bounds for tick placement
    const rx1 = margin, ry1 = margin, rx2 = W - margin, ry2 = H - margin;
    const perimTop    = rx2 - rx1;
    const perimRight  = ry2 - ry1;
    const perimBottom = rx2 - rx1;
    const perimLeft   = ry2 - ry1;
    const perimeter   = perimTop + perimRight + perimBottom + perimLeft;

    ctx.lineCap = 'round';

    for (let i = 0; i < 60; i++) {
      const isMajor = i % 5 === 0;
      const frac = i / 60;
      const dist = frac * perimeter;

      let px, py, nx, ny;

      if (dist < perimTop) {
        // top edge, left→right
        px = rx1 + dist; py = ry1; nx = 0; ny = 1;
      } else if (dist < perimTop + perimRight) {
        // right edge, top→bottom
        px = rx2; py = ry1 + (dist - perimTop); nx = -1; ny = 0;
      } else if (dist < perimTop + perimRight + perimBottom) {
        // bottom edge, right→left
        px = rx2 - (dist - perimTop - perimRight); py = ry2; nx = 0; ny = -1;
      } else {
        // left edge, bottom→top
        px = rx1; py = ry2 - (dist - perimTop - perimRight - perimBottom); nx = 1; ny = 0;
      }

      const len = isMajor ? tickMajorLen : tickMinorLen;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + nx * len, py + ny * len);
      ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)';
      ctx.lineWidth   = isMajor ? S * 0.005 : S * 0.0025;
      ctx.stroke();
    }

    // ── Hour numbers ─────────────────────────────────────────
    const numRadius = S * 0.34;
    const fontSize  = S * 0.072;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#ffffff';
    ctx.font         = `300 ${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;

    for (let h = 1; h <= 12; h++) {
      const angle = (h / 12) * Math.PI * 2 - Math.PI / 2;
      ctx.fillText(h, cx + numRadius * Math.cos(angle), cy + numRadius * Math.sin(angle));
    }

    // ── QUARTZ label ─────────────────────────────────────────
    ctx.font      = `400 ${S * 0.02}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillText('QUARTZ', cx, cy + numRadius * 0.5);

    // ── Hands ────────────────────────────────────────────────
    const now = new Date();
    const sec = now.getSeconds() + now.getMilliseconds() / 1000;
    const min = now.getMinutes() + sec / 60;
    const hr  = (now.getHours() % 12) + min / 60;

    const secAngle = sec / 60 * Math.PI * 2 - Math.PI / 2;
    const minAngle = min / 60 * Math.PI * 2 - Math.PI / 2;
    const hrAngle  = hr  / 12 * Math.PI * 2 - Math.PI / 2;

    function hand(angle, len, tail, width, color, glow) {
      const ex = cx + Math.cos(angle) * len;
      const ey = cy + Math.sin(angle) * len;
      const tx = cx - Math.cos(angle) * tail;
      const ty = cy - Math.sin(angle) * tail;

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = glow;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = color;
      ctx.lineWidth   = width;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
    }

    hand(hrAngle,  S * 0.21, S * 0.04,  S * 0.012, '#f0f0f0', S * 0.06);
    hand(minAngle, S * 0.31, S * 0.05,  S * 0.008, '#f0f0f0', S * 0.04);

    // ── Center jewel ─────────────────────────────────────────
    ctx.save();
    ctx.shadowColor = '#c8a84b';
    ctx.shadowBlur  = S * 0.03;
    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.016, 0, Math.PI * 2);
    ctx.fillStyle = '#c8a84b';
    ctx.fill();
    ctx.restore();

    ctx.beginPath();
    ctx.arc(cx, cy, S * 0.007, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
